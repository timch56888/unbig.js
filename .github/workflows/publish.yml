name: Publish to npm

on:
  push:
    branches: [main, dev, alpha, beta]
    paths:
      - package.json

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - id: tag
        run: |
          ref="${{ github.ref_name }}"
          [ "$ref" = main ] && t=latest || t="$ref"
          echo "tag=$t" >> "$GITHUB_OUTPUT"

      - run: npm publish --tag "${{ steps.tag.outputs.tag }}" --access public --provenance=false
